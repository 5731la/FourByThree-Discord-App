<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4 × 3</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e1f22; /* Discord dark background — shown briefly while loading */
    }

    #game-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Loading overlay shown until the iframe content is ready */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #1e1f22;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      z-index: 10;
      transition: opacity 0.3s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading 4 × 3…</span>
  </div>

  <iframe
    id="game-frame"
    src="/hankgreen/fourbythree"
    title="4 × 3 by Hank Green"
    allow="clipboard-write"
  ></iframe>

  <script type="module">
    // Initialise the Discord Embedded App SDK.
    // We only need ready() — no OAuth required since the game doesn't use Discord identity.
    // Discord Embedded App SDK is served locally to avoid CDN CORS/MIME issues.
    import { DiscordSDK } from '/static/index.mjs';

    // DISCORD_CLIENT_ID is injected by the Go server at request time.
    const clientId = window.__DISCORD_CLIENT_ID__;

    async function initDiscord() {
      try {
        const sdk = new DiscordSDK(clientId);
        await sdk.ready();
        console.log('[4x3] Discord SDK ready');
      } catch (err) {
        // Outside Discord (local dev) — sdk.ready() will time out or throw. That's fine.
        console.warn('[4x3] Discord SDK not available (local dev mode):', err.message);
      }
    }

    // Hide the loading overlay once the iframe has loaded.
    const frame = document.getElementById('game-frame');
    const loading = document.getElementById('loading');
    frame.addEventListener('load', () => loading.classList.add('hidden'));

    // Start Discord SDK init in parallel with iframe load.
    initDiscord();
  </script>
</body>
</html>
